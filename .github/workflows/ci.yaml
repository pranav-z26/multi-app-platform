name: Y-axis Platform CI/CD

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  # JOB 1 - backend
  test-backends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, dashboard-service, store-service]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      working-directory: ./server/${{ matrix.service }}
      run: npm install

  # JOB 2 - Build frontend apps
  build-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [main-app, dashboard-app, store-app]
        
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      working-directory: ./client/${{ matrix.app }}
      run: npm install

    - name: Build Vite App
      working-directory: ./client/${{ matrix.app }}
      run: npm run build

  # JOB 3 - For validating Docker configuration
  docker-validation:
    needs: [test-backends, build-frontends]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Test Docker Compose Build
      run: docker compose build